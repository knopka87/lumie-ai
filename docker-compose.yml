version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: lumie-db
    environment:
      POSTGRES_DB: lumie
      POSTGRES_USER: lumie
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lumie_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumie"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: lumie-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://lumie:${DB_PASSWORD:-lumie_secret}@db:5432/lumie
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_SECRET}
      APP_URL: ${APP_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  pgdata:
